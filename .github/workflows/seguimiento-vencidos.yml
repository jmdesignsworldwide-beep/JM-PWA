name: Seguimiento de eventos vencidos

# La franja de la MAÑANA ya la cubre el cron diario de Vercel (/api/cron/daily),
# que corre sin configurar nada. Este workflow SOLO agrega mediodía y noche para
# completar las 3 preguntas del día — el plan free de Vercel no permite más de un
# cron diario. Le pega a /api/cron/seguimiento, protegido con CRON_SECRET.
#
# Requiere dos secretos del repo (Settings → Secrets and variables → Actions):
#   · APP_URL     → dominio de producción, p. ej. https://jm-pwa.vercel.app
#   · CRON_SECRET → el MISMO valor que la variable CRON_SECRET en Vercel
#
# Sin estos secretos igual funciona el aviso de la mañana (vía Vercel); esto solo
# suma las otras dos franjas. Horario en RD (UTC-4, sin horario de verano):
#   13:00 RD = 17:00 UTC (mediodía) · 20:00 RD = 00:00 UTC (noche)
on:
  schedule:
    - cron: "0 17 * * *" # mediodía (13:00 RD)
    - cron: "0 0 * * *"  # noche (20:00 RD)
  workflow_dispatch: {}   # permite dispararlo a mano para probar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar al cron de seguimiento
        run: |
          if [ -z "${{ secrets.APP_URL }}" ] || [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "Faltan los secretos APP_URL y/o CRON_SECRET."
            exit 1
          fi
          code=$(curl -sS -o /tmp/out.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/seguimiento")
          echo "HTTP $code"
          cat /tmp/out.txt
          test "$code" = "200"
